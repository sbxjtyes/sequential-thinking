# Application Configuration for Sequential Thinking MCP

# Feature flags
features:
  # Settings for semantic (content-based) analysis
  semanticAnalysis:
    enabled: true
    defaultLang: "zh" # Set default language for analysis ('en' or 'zh')

  # Settings for automatic prompt generation on new stage entry
  automaticPrompts:
    enabled: true

  # Claude-inspired extended thinking (多角度探索、自我校验、自适应深度)
  extendedThinking:
    enabled: true  # Enable reflection prompts for multi-angle, self-check, adaptive depth
